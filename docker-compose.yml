services:
  redis:
    image: redis:alpine
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: options_assistant
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped

  poller:
    build:
      context: ./backend
    command: python services/poller.py
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      - ATM_PCT=${ATM_PCT:-8}
      - POLLER_BASE_COIN=${POLLER_BASE_COIN:-ETH}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build:
      context: ./backend
    command: python telegram_bot.py
    depends_on:
      - backend
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - API_URL=http://backend:8000/api/v1
    restart: unless-stopped
    profiles:
      - bot

volumes:
  postgres_data:
