services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: options_assistant
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
    restart: unless-stopped

  poller:
    build:
      context: ./backend
    command: python services/poller.py
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      - ATM_PCT=${ATM_PCT:-8}
      - POLLER_BASE_COIN=${POLLER_BASE_COIN:-ETH}
    restart: unless-stopped

  paper:
    build:
      context: ./backend
    command: python services/paper_loop.py
    depends_on:
      - postgres
      - poller
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
      - PAPER_POLL_INTERVAL=${PAPER_POLL_INTERVAL:-30}
      - MC_ACCOUNT_NAME=eth_signal
    restart: unless-stopped

  # Second poller instance, BTC-only — writes BTCUSDT klines/option snapshots into
  # the SAME klines/option_snapshots tables (already keyed by symbol), so no new
  # poller code was needed, just POLLER_BASE_COIN=BTC. Feeds btc_straddle_loop.py's
  # trailing-realized-vol entry sigma.
  btc_poller:
    build:
      context: ./backend
    command: python services/poller.py
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      - ATM_PCT=${ATM_PCT:-8}
      - POLLER_BASE_COIN=BTC
    restart: unless-stopped

  # BTC unconditional short-straddle paper bot — separate book from the ETH V3
  # book above (own btc_straddle_* tables, same Postgres DB). Auto-starts. See
  # BTC_STRADDLE_HANDOFF.md / services/btc_straddle_loop.py.
  btc_paper:
    build:
      context: ./backend
    command: python services/btc_straddle_loop.py
    depends_on:
      - postgres
      - btc_poller
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
      - BTC_STRADDLE_POLL_INTERVAL=${BTC_STRADDLE_POLL_INTERVAL:-30}
      - BTC_STRADDLE_START_EQUITY_USD=${BTC_STRADDLE_START_EQUITY_USD:-2000}
      - BTC_STRADDLE_MARGIN_PCT=${BTC_STRADDLE_MARGIN_PCT:-0.15}
      - MC_ACCOUNT_NAME=btc_straddle
    restart: unless-stopped

  # ETH unconditional short-straddle paper bot — separate book from the ETH V3
  # signal book above (own eth_straddle_* tables, same Postgres DB). Depends on
  # the default `poller` (already feeds ETHUSDT klines, no second poller needed
  # unlike the BTC case). Auto-starts. See ETH_STRADDLE_PAPER_BOT_HANDOFF.md /
  # services/eth_straddle_loop.py.
  eth_straddle_paper:
    build:
      context: ./backend
    command: python services/eth_straddle_loop.py
    depends_on:
      - postgres
      - poller
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_assistant
      - ETH_STRADDLE_POLL_INTERVAL=${ETH_STRADDLE_POLL_INTERVAL:-30}
      - ETH_STRADDLE_START_EQUITY_USD=${ETH_STRADDLE_START_EQUITY_USD:-1200}
      - ETH_STRADDLE_MARGIN_PCT=${ETH_STRADDLE_MARGIN_PCT:-0.15}
      - MC_ACCOUNT_NAME=eth_straddle
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build:
      context: ./backend
    command: python telegram_bot.py
    depends_on:
      - backend
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - API_URL=http://backend:8000/api/v1
    restart: unless-stopped
    profiles:
      - bot

  # Live real-money trader. Same image as `paper`, but a SEPARATE database
  # (options_trader) so live data never mixes with the paper shadow, and
  # TRADING_MODE=live. Does NOT auto-start — launch explicitly:
  #     docker compose --profile trader up -d trader
  # Even then it is ARMED-OFF (LIVE_ENABLED=false) → no real orders until you set
  # LIVE_ENABLED=true in .env. File kill-switch: `touch /data/STOP_TRADING` (or
  # `docker exec opt-app-trader-1 touch /data/STOP_TRADING`). The `paper` service
  # keeps running unchanged as a shadow.
  trader:
    build:
      context: ./backend
    command: sh -c "python db/bootstrap.py && python services/paper_loop.py"
    depends_on:
      - postgres
      - poller
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_trader
      - PAPER_POLL_INTERVAL=${PAPER_POLL_INTERVAL:-30}
      - MC_ACCOUNT_NAME=eth_signal
      - TRADING_MODE=live
      - LIVE_ENABLED=${LIVE_ENABLED:-false}
      - LIVE_KILLSWITCH_FILE=/data/STOP_TRADING
    volumes:
      - trader_data:/data
    restart: unless-stopped
    profiles:
      - trader

  # Live real-money BTC straddle trader. Same image as `btc_paper`, same script
  # (services/btc_straddle_loop.py — broker.is_live() is the only thing that
  # changes behaviour), but a SEPARATE database (options_trader_btc) so live data
  # never mixes with the btc_paper shadow, and TRADING_MODE=live. Does NOT
  # auto-start — launch explicitly:
  #     docker compose --profile trader up -d btc_trader
  # Even then it is ARMED-OFF (LIVE_ENABLED_BTC=false) until you set it in .env.
  # File kill-switch: `touch /data/STOP_TRADING_BTC` (own kill-switch, independent
  # of the ETH trader's). The `btc_paper` service keeps running unchanged as a
  # shadow. Capital note: this and `trader` now run on SEPARATE Bybit accounts
  # (one key + wallet per bot — see services/execution_config.py's
  # MC_ACCOUNT_NAME / Mission Control settings UI), so the old shared-capital
  # split is no longer a concern; LIVE_MAX_CAPITAL_USDT is just a per-bot cap
  # on its own account's funds.
  btc_trader:
    build:
      context: ./backend
    command: sh -c "python db/bootstrap.py && python services/btc_straddle_loop.py"
    depends_on:
      - postgres
      - btc_poller
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/options_trader_btc
      - BTC_STRADDLE_POLL_INTERVAL=${BTC_STRADDLE_POLL_INTERVAL:-30}
      - BTC_STRADDLE_START_EQUITY_USD=${BTC_STRADDLE_START_EQUITY_USD:-2000}
      - BTC_STRADDLE_MARGIN_PCT=${BTC_STRADDLE_MARGIN_PCT:-0.15}
      - MC_ACCOUNT_NAME=btc_straddle
      - TRADING_MODE=live
      - LIVE_ENABLED=${LIVE_ENABLED_BTC:-false}
      - LIVE_KILLSWITCH_FILE=/data/STOP_TRADING_BTC
    volumes:
      - btc_trader_data:/data
    restart: unless-stopped
    profiles:
      - trader

volumes:
  postgres_data:
  trader_data:
  btc_trader_data:
